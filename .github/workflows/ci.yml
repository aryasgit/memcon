name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU torch keeps CI light)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.12.0 --index-url https://download.pytorch.org/whl/cpu || pip install torch==2.12.0
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        # The recall-fusion / entity / capture core-loop tests always run.
        # Qdrant-backed integration tests skip automatically with no server
        # present (they self-detect localhost:6333), so the suite is green
        # without standing up extra services.
        run: python -m pytest tests/ -q
