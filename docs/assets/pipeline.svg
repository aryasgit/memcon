<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 980" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1480" height="980" fill="#ffffff"/>

  <!-- title -->
  <text x="48" y="50" fill="#0f172a" font-size="25" font-weight="700">How memcon works</text>
  <text x="48" y="76" fill="#64748b" font-size="14">Claude pulls the few notes that match before it answers — then writes the fix back. Everything runs on your machine.</text>

  <!-- ============ SWIMLANES ============ -->
  <!-- You -->
  <rect x="48" y="98" width="316" height="824" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="48" y="98" width="316" height="44" rx="12" fill="#eef2f7"/>
  <rect x="48" y="120" width="316" height="22" fill="#eef2f7"/>
  <text x="206" y="126" fill="#0f172a" font-size="15" font-weight="600" text-anchor="middle">You</text>
  <!-- Claude -->
  <rect x="380" y="98" width="360" height="824" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="380" y="98" width="360" height="44" rx="12" fill="#eef2f7"/>
  <rect x="380" y="120" width="360" height="22" fill="#eef2f7"/>
  <text x="560" y="126" fill="#0f172a" font-size="15" font-weight="600" text-anchor="middle">Claude · over MCP</text>
  <!-- memcon -->
  <rect x="756" y="98" width="440" height="824" rx="12" fill="#f4fbf8" stroke="#cdeede"/>
  <rect x="756" y="98" width="440" height="44" rx="12" fill="#e6f6ee"/>
  <rect x="756" y="120" width="440" height="22" fill="#e6f6ee"/>
  <text x="976" y="126" fill="#065f46" font-size="15" font-weight="600" text-anchor="middle">memcon · 100% local</text>

  <!-- ============ CONNECTORS (drawn first, under nodes) ============ -->
  <g fill="none" stroke="#94a3b8" stroke-width="1.7">
    <!-- start -> ask -->
    <path d="M206,172 L206,198" marker-end="url(#arr)"/>
    <!-- ask -> recall -->
    <path d="M318,224 L450,224" marker-end="url(#arr)"/>
    <!-- recall -> fork (down,right,down) -->
    <path d="M560,252 L560,278 L976,278 L976,300" marker-end="url(#arr)"/>
    <!-- fork -> semantic / entity -->
    <path d="M872,314 L872,348" marker-end="url(#arr)"/>
    <path d="M1080,314 L1080,348" marker-end="url(#arr)"/>
    <!-- semantic / entity -> join -->
    <path d="M872,408 L872,440" marker-end="url(#arr)"/>
    <path d="M1080,408 L1080,440" marker-end="url(#arr)"/>
    <!-- join -> rank -->
    <path d="M976,456 L976,494" marker-end="url(#arr)"/>
    <!-- rank -> grounded answer (left) -->
    <path d="M858,524 L672,524" marker-end="url(#arr)"/>
    <!-- answer -> confirm (down,left,down) -->
    <path d="M560,554 L560,584 L206,584 L206,600" marker-end="url(#arr)"/>
    <!-- confirm -> capture (down,right) -->
    <path d="M206,656 L206,690 L450,690" marker-end="url(#arr)"/>
    <!-- capture -> write -->
    <path d="M670,690 L852,690" marker-end="url(#arr)"/>
    <!-- write -> vault store -->
    <path d="M976,720 L976,760" marker-end="url(#arr)"/>
    <!-- vault -> end -->
    <path d="M976,832 L976,866" marker-end="url(#arr)"/>
  </g>

  <!-- edge labels -->
  <text x="762" y="508" fill="#64748b" font-size="11.5" text-anchor="middle">answers from the matches</text>
  <text x="320" y="578" fill="#64748b" font-size="11.5" text-anchor="middle">you apply it</text>
  <text x="1006" y="746" fill="#64748b" font-size="11.5" text-anchor="start">written + re-indexed</text>

  <!-- ============ NODES ============ -->
  <!-- N1 start -->
  <circle cx="206" cy="158" r="14" fill="#475569"/>
  <text x="232" y="162" fill="#64748b" font-size="11.5">start</text>

  <!-- N2 ask (You) -->
  <rect x="94" y="198" width="224" height="52" rx="26" fill="#4f46e5"/>
  <text x="206" y="222" fill="#ffffff" font-size="14.5" font-weight="600" text-anchor="middle">Ask Claude</text>
  <text x="206" y="240" fill="#c7d2fe" font-size="11" text-anchor="middle">a bug, an error, "have we seen this?"</text>

  <!-- N3 recall (Claude) -->
  <rect x="450" y="198" width="220" height="52" rx="26" fill="#4f46e5"/>
  <text x="560" y="222" fill="#ffffff" font-size="14.5" font-weight="600" text-anchor="middle">Recall</text>
  <text x="560" y="240" fill="#c7d2fe" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">memcon_recall()</text>

  <!-- N4 fork bar -->
  <rect x="851" y="300" width="250" height="14" rx="3" fill="#334155"/>
  <text x="1110" y="311" fill="#94a3b8" font-size="11">fork — run both</text>

  <!-- N5a semantic -->
  <rect x="782" y="348" width="180" height="60" rx="14" fill="#0d9488"/>
  <text x="872" y="372" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Semantic</text>
  <text x="872" y="391" fill="#ccfbf1" font-size="11" text-anchor="middle">Qdrant vectors — by meaning</text>
  <!-- N5b exact-entity -->
  <rect x="990" y="348" width="180" height="60" rx="14" fill="#0d9488"/>
  <text x="1080" y="372" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Exact-entity</text>
  <text x="1080" y="391" fill="#ccfbf1" font-size="11" text-anchor="middle">SQLite — file / symbol / error</text>

  <!-- N6 join bar -->
  <rect x="851" y="440" width="250" height="14" rx="3" fill="#334155"/>
  <text x="1110" y="451" fill="#94a3b8" font-size="11">join — wait for both</text>

  <!-- N7 rank (memcon) -->
  <rect x="858" y="494" width="236" height="60" rx="14" fill="#0d9488"/>
  <text x="976" y="518" fill="#ffffff" font-size="14.5" font-weight="600" text-anchor="middle">Rank</text>
  <text x="976" y="537" fill="#ccfbf1" font-size="11" text-anchor="middle">recency + outcome (resolved/open/failed)</text>

  <!-- N8 grounded answer (Claude) -->
  <rect x="452" y="494" width="220" height="60" rx="14" fill="#4f46e5"/>
  <text x="562" y="518" fill="#ffffff" font-size="14.5" font-weight="600" text-anchor="middle">Grounded answer</text>
  <text x="562" y="537" fill="#c7d2fe" font-size="11" text-anchor="middle">from your notes, with sources</text>

  <!-- N9 confirm (You) -->
  <rect x="94" y="600" width="224" height="56" rx="14" fill="#4f46e5"/>
  <text x="206" y="624" fill="#ffffff" font-size="14.5" font-weight="600" text-anchor="middle">Confirm the fix</text>
  <text x="206" y="642" fill="#c7d2fe" font-size="11" text-anchor="middle">"that worked"</text>

  <!-- N10 capture (Claude) -->
  <rect x="450" y="664" width="220" height="52" rx="26" fill="#4f46e5"/>
  <text x="560" y="688" fill="#ffffff" font-size="14.5" font-weight="600" text-anchor="middle">Capture</text>
  <text x="560" y="706" fill="#c7d2fe" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">memcon_capture()</text>

  <!-- N11 write (memcon) -->
  <rect x="852" y="662" width="248" height="56" rx="14" fill="#0d9488"/>
  <text x="976" y="686" fill="#ffffff" font-size="14.5" font-weight="600" text-anchor="middle">Write typed note</text>
  <text x="976" y="704" fill="#ccfbf1" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">debugging/redis-pool.md</text>

  <!-- N12 vault data store (memcon) -->
  <path d="M851,772 q0,-12 12,-12 h60 l10,10 h146 q12,0 12,12 v48 q0,12 -12,12 h-244 q-12,0 -12,-12 z"
        fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <text x="976" y="794" fill="#065f46" font-size="14.5" font-weight="700" text-anchor="middle">vault/ — markdown you own</text>
  <text x="976" y="812" fill="#059669" font-size="11" text-anchor="middle">+ index (Qdrant · SQLite) · grep it, edit it, walk away</text>

  <!-- N13 end -->
  <circle cx="976" cy="882" r="15" fill="#ffffff" stroke="#475569" stroke-width="3"/>
  <circle cx="976" cy="882" r="7" fill="#475569"/>
  <text x="1002" y="886" fill="#64748b" font-size="11.5">end</text>

  <!-- ============ LEGEND ============ -->
  <rect x="1232" y="300" width="216" height="332" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="1256" y="332" fill="#0f172a" font-size="13" font-weight="700" letter-spacing="1">LEGEND</text>

  <circle cx="1268" cy="372" r="11" fill="#475569"/>
  <text x="1292" y="376" fill="#334155" font-size="13">Start</text>

  <rect x="1256" y="404" width="26" height="18" rx="9" fill="#4f46e5"/>
  <text x="1292" y="418" fill="#334155" font-size="13">Action — You / Claude</text>

  <rect x="1256" y="446" width="26" height="18" rx="6" fill="#0d9488"/>
  <text x="1292" y="460" fill="#334155" font-size="13">memcon step</text>

  <rect x="1256" y="490" width="26" height="9" rx="2" fill="#334155"/>
  <text x="1292" y="500" fill="#334155" font-size="13">Fork / join</text>

  <rect x="1256" y="528" width="26" height="20" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4"/>
  <text x="1292" y="542" fill="#334155" font-size="13">Data store (vault)</text>

  <circle cx="1269" cy="582" r="10" fill="#ffffff" stroke="#475569" stroke-width="2.6"/>
  <circle cx="1269" cy="582" r="4.5" fill="#475569"/>
  <text x="1292" y="586" fill="#334155" font-size="13">End</text>

  <!-- footer -->
  <text x="48" y="958" fill="#64748b" font-size="13">Next session, the note is already in the vault — so the fix shows up with the bug. No cloud, no API keys, no copy-paste.</text>
</svg>
