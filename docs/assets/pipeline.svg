<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 600" font-family="'Inter Tight','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#7a7a7a"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#3dd07a"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1160" height="600" rx="16" fill="#0a0a0a"/>

  <!-- title -->
  <text x="40" y="48" fill="#f4f4f4" font-size="23" font-weight="600">How memcon works</text>
  <text x="40" y="74" fill="#8a8a8a" font-size="13.5">Claude pulls the few notes that match before it answers — then writes the fix back. Every box runs on your machine.</text>

  <!-- local boundary -->
  <rect x="36" y="100" width="1088" height="450" rx="16" fill="none" stroke="#2e6b46" stroke-width="1.3" stroke-dasharray="7 6"/>
  <rect x="52" y="91" width="232" height="18" fill="#0a0a0a"/>
  <circle cx="64" cy="100" r="4" fill="#3dd07a"/>
  <text x="76" y="104.5" fill="#3dd07a" font-size="11.5" font-weight="600" letter-spacing="1.5">YOUR MACHINE · 100% LOCAL</text>

  <!-- ===================== READ ROW ===================== -->
  <text x="56" y="138" fill="#5a5a5a" font-size="11" font-weight="600" letter-spacing="2">RECALL  ▸  BEFORE CLAUDE ANSWERS</text>

  <!-- N1 You -->
  <rect x="56" y="150" width="150" height="78" rx="10" fill="#131313" stroke="#2b2b2b"/>
  <text x="131" y="186" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">You</text>
  <text x="131" y="206" fill="#8a8a8a" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">ask Claude normally</text>

  <!-- N2 Claude -->
  <rect x="240" y="150" width="158" height="78" rx="10" fill="#131313" stroke="#2b2b2b"/>
  <text x="319" y="186" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">Claude · over MCP</text>
  <text x="319" y="206" fill="#66d9ef" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">memcon_recall()</text>

  <!-- N3 Retrieve (hybrid) -->
  <rect x="432" y="140" width="232" height="98" rx="10" fill="#131313" stroke="#2b2b2b"/>
  <text x="548" y="166" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">Retrieve · hybrid</text>
  <circle cx="452" cy="188" r="4" fill="#ae81ff"/>
  <text x="462" y="192" fill="#cfcfcf" font-size="11" font-family="'JetBrains Mono',monospace">semantic — Qdrant vectors</text>
  <circle cx="452" cy="212" r="4" fill="#66d9ef"/>
  <text x="462" y="216" fill="#cfcfcf" font-size="11" font-family="'JetBrains Mono',monospace">exact entity — SQLite index</text>

  <!-- N4 Rank -->
  <rect x="700" y="150" width="150" height="78" rx="10" fill="#131313" stroke="#2b2b2b"/>
  <text x="775" y="180" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">Rank</text>
  <text x="775" y="199" fill="#8a8a8a" font-size="10.5" text-anchor="middle" font-family="'JetBrains Mono',monospace">recency + outcome</text>
  <text x="775" y="215" fill="#3dd07a" font-size="10.5" text-anchor="middle" font-family="'JetBrains Mono',monospace">resolved / open / failed</text>

  <!-- N5 Answer -->
  <rect x="886" y="150" width="178" height="78" rx="10" fill="#131313" stroke="#2b2b2b"/>
  <text x="975" y="180" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">Grounded answer</text>
  <text x="975" y="200" fill="#8a8a8a" font-size="10.5" text-anchor="middle" font-family="'JetBrains Mono',monospace">from your notes,</text>
  <text x="975" y="215" fill="#8a8a8a" font-size="10.5" text-anchor="middle" font-family="'JetBrains Mono',monospace">with sources</text>

  <!-- read arrows -->
  <line x1="206" y1="189" x2="238" y2="189" stroke="#7a7a7a" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="398" y1="189" x2="430" y2="189" stroke="#7a7a7a" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="664" y1="189" x2="698" y2="189" stroke="#7a7a7a" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="850" y1="189" x2="884" y2="189" stroke="#7a7a7a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ===================== HUB ===================== -->
  <rect x="432" y="300" width="418" height="80" rx="10" fill="#0f140f" stroke="#2e6b46" stroke-width="1.2"/>
  <text x="548" y="330" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">vault/ — plain markdown you own</text>
  <text x="548" y="351" fill="#8a8a8a" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">grep it · edit it · walk away with it</text>
  <line x1="690" y1="318" x2="690" y2="362" stroke="#2e6b46" stroke-width="1"/>
  <text x="775" y="334" fill="#cfcfcf" font-size="12.5" text-anchor="middle" font-weight="600">index</text>
  <text x="775" y="353" fill="#8a8a8a" font-size="10.5" text-anchor="middle" font-family="'JetBrains Mono',monospace">Qdrant + SQLite</text>
  <text x="775" y="368" fill="#5a5a5a" font-size="9.5" text-anchor="middle" font-family="'JetBrains Mono',monospace">rebuildable cache</text>

  <!-- hub <-> retrieve (read) -->
  <line x1="548" y1="300" x2="548" y2="240" stroke="#7a7a7a" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="556" y="262" width="120" height="16" fill="#0a0a0a"/>
  <text x="560" y="274" fill="#8a8a8a" font-size="11" font-family="'JetBrains Mono',monospace">reads the matches</text>

  <!-- ===================== WRITE ROW ===================== -->
  <text x="432" y="436" fill="#5a5a5a" font-size="11" font-weight="600" letter-spacing="2">CAPTURE  ▸  AFTER YOU CONFIRM THE FIX</text>

  <!-- W3 Typed note -->
  <rect x="432" y="450" width="232" height="78" rx="10" fill="#131313" stroke="#2b2b2b"/>
  <text x="548" y="480" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">Typed note</text>
  <text x="548" y="500" fill="#e6db74" font-size="10.5" text-anchor="middle" font-family="'JetBrains Mono',monospace">debugging/redis-pool.md</text>
  <text x="548" y="515" fill="#8a8a8a" font-size="10" text-anchor="middle" font-family="'JetBrains Mono',monospace">symptom · cause · fix · status</text>

  <!-- W2 Claude writes -->
  <rect x="700" y="450" width="150" height="78" rx="10" fill="#131313" stroke="#2b2b2b"/>
  <text x="775" y="486" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">Claude writes it</text>
  <text x="775" y="506" fill="#66d9ef" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">memcon_capture()</text>

  <!-- W1 You confirm -->
  <rect x="886" y="450" width="178" height="78" rx="10" fill="#131313" stroke="#2b2b2b"/>
  <text x="975" y="486" fill="#f4f4f4" font-size="15" font-weight="600" text-anchor="middle">You confirm the fix</text>
  <text x="975" y="506" fill="#8a8a8a" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">“that worked”</text>

  <!-- write arrows (right to left) -->
  <line x1="886" y1="489" x2="852" y2="489" stroke="#7a7a7a" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="700" y1="489" x2="666" y2="489" stroke="#7a7a7a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- typed note -> hub (write up) -->
  <line x1="548" y1="450" x2="548" y2="382" stroke="#3dd07a" stroke-width="1.5" marker-end="url(#ahg)"/>
  <rect x="556" y="404" width="240" height="16" fill="#0a0a0a"/>
  <text x="560" y="416" fill="#3dd07a" font-size="11" font-family="'JetBrains Mono',monospace">written instantly · watcher re-indexes</text>

  <!-- loop: answer -> you confirm -->
  <path d="M1064,189 C 1112,280 1112,400 1064,489" fill="none" stroke="#3dd07a" stroke-width="1.5" marker-end="url(#ahg)"/>
  <text x="1108" y="343" fill="#3dd07a" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace" transform="rotate(90 1108 343)">you apply the fix</text>

  <!-- footer note -->
  <text x="40" y="582" fill="#5a5a5a" font-size="11.5">Next session, the new note is already in the vault — so the fix shows up with the bug. No cloud, no API keys, no copy-paste.</text>
</svg>
