services:
  qdrant:
    image: qdrant/qdrant
    # Loopback only — never expose the vector DB (which has NO auth) to the
    # LAN/WAN. memcon is local-first; a bare "6333:6333" published it on 0.0.0.0.
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    # Cap memory so a bulk ingest can't drive the host into swap/OOM.
    mem_limit: 2g
