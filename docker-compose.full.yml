# Full docker-compose stack — no local Python needed.
#
# Runs Qdrant + Memcon API + vault watcher in containers. The vault and
# memcon.config.yaml are bind-mounted from the host so notes live locally.
#
# Quick start:
#   docker compose -f docker-compose.full.yml up -d
#   open http://localhost:8000/ui
#
# This file does NOT include Ollama — install Ollama on the host
# (https://ollama.com) and the API will reach it via host.docker.internal.

services:
  qdrant:
    image: qdrant/qdrant
    # Loopback only — the vector DB has no auth; never publish it to the network.
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    mem_limit: 2g

  memcon:
    build: .
    depends_on:
      - qdrant
    # Loopback only — the API exposes /memory/* writes and /ask. This matches the
    # native start.sh localhost hardening (commit c41d539); a bare "8000:8000"
    # bypassed it and published the API on every interface.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # Point Qdrant client at the qdrant service (overrides memcon.config.yaml host).
      # Note: memcon.config.yaml is still authoritative for everything else.
      - MEMCON_QDRANT_HOST=qdrant
    volumes:
      - ./vault:/app/vault
      - ./memcon.config.yaml:/app/memcon.config.yaml
      - ./.env:/app/.env
    extra_hosts:
      # Lets the API reach Ollama running on the host machine
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Cap memory (Qdrant client + embeddings + uvicorn) so a bulk ingest can't
    # OOM the host. The app tolerates Qdrant still warming up (lazy client +
    # timeout), so no healthcheck gate is needed on startup.
    mem_limit: 4g
