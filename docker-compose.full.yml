# Full docker-compose stack — no local Python needed.
#
# Runs Qdrant + Engram API + vault watcher in containers. The vault and
# engram.config.yaml are bind-mounted from the host so notes live locally.
#
# Quick start:
#   docker compose -f docker-compose.full.yml up -d
#   open http://localhost:8000/ui
#
# This file does NOT include Ollama — install Ollama on the host
# (https://ollama.com) and the API will reach it via host.docker.internal.

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  engram:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    environment:
      # Point Qdrant client at the qdrant service (overrides engram.config.yaml host).
      # Note: engram.config.yaml is still authoritative for everything else.
      - ENGRAM_QDRANT_HOST=qdrant
    volumes:
      - ./vault:/app/vault
      - ./engram.config.yaml:/app/engram.config.yaml
      - ./.env:/app/.env
    extra_hosts:
      # Lets the API reach Ollama running on the host machine
      - "host.docker.internal:host-gateway"
