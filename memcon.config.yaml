project:
  name: "BARQ"
  description: "Autonomous quadruped robot"
  domain: "robotics"

vault:
  path: "./vault"
  skip_dirs: ["_templates", ".memcon"]   # .memcon/ holds the entity index DB
  chunk_size: 400
  min_chunk_length: 30

memory:
  collection: "memcon_memory"
  embedding_model: "all-MiniLM-L6-v2"
  vector_dim: 384

llm:
  # A local LLM is OPTIONAL. memcon works without it — the assistant (Claude)
  # does the reasoning, and memcon handles storage + embeddings + retrieval
  # (those use sentence-transformers, NOT a local LLM). Install Ollama only for
  # fully-offline auto-structuring / self-contained answers (opt in at install
  # time with MEMCON_WITH_OLLAMA=1). When no local LLM is reachable, capture
  # keeps the raw note and ask/digest return the chunks for you to use.
  provider: "ollama"          # set to "none" to force the no-LLM (lean) path
  enabled: true               # auto-detected: a present Ollama is used, an absent one degrades
  model: "qwen2.5-coder:7b"
  base_url: "http://localhost:11434/v1"
  max_tokens: 1024
  timeout: 90                 # hard per-call ceiling (seconds) so a hung model can't block

qdrant:
  host: "localhost"
  port: 6333

api:
  host: "127.0.0.1"               # localhost only — never expose memory on the network
  port: 8000
  rate_limit_per_min: 300         # per-client cap across ALL routes
  write_rate_limit_per_min: 60    # stricter cap on write / LLM / ingest routes
  max_body_bytes: 1000000         # reject request bodies larger than ~1 MB (413)
  allowed_hosts: ["localhost", "127.0.0.1"]   # Host-header allowlist (anti DNS-rebinding)

# subsystems — a soft constraint on the `subsystem` field in note frontmatter.
# Used by memcon_capture as a hint to the LLM (it tries to pick from this
# list). Leave empty `[]` to accept any free-form string. Add the buckets
# that make sense for your domain — these are BARQ's.
subsystems:
  - servo
  - imu
  - gait
  - power
  - vision
  - voice
  - slam
  - ik
  - version_control

# memory_types — legacy taxonomy kept for back-compat. The new `type` field
# in note frontmatter uses note_kinds below; memory_type is auto-derived.
memory_types:
  - episodic
  - semantic
  - procedural
  - causal

# note_kinds — informational, the canonical list lives in memory/templates.py
# (ALL_KINDS). Listed here so you can see what memcon_capture can produce.
note_kinds:
  - debug          # something broke; investigation + fix
  - decision       # a non-obvious choice + rationale
  - experiment     # tried X; here's what happened
  - concept        # definition / mental model
  - reference      # captured API / spec / external resource
  - meeting        # sync / discussion notes
  - breakthrough   # the "aha" insight that unlocked future work
  - session        # end-of-session roll-up

# entity categories captured by extractor.extract_entities()
# (informational — the canonical list is ENTITY_CATEGORIES in memory/extractor.py)
entity_categories:
  - files          # source paths / file names
  - symbols        # functions, classes, methods
  - errors         # exception types, error codes, error messages
  - packages       # external libraries / packages
  - urls           # http(s) links
  - concepts       # named products, services, hardware, domain terms
